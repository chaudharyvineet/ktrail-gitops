apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-api-readonly
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-api-readonly
subjects:
  - kind: ServiceAccount
    name: demo-api
roleRef:
  kind: Role
  name: demo-api-readonly
  apiGroup: rbac.authorization.k8s.io
