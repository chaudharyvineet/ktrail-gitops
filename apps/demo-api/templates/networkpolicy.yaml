apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-api-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
